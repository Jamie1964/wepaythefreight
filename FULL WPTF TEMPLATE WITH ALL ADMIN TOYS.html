<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PAGE_TITLE_HERE</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="PAGE_DESCRIPTION_HERE">

<link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:ital,wght@1,300&display=swap" rel="stylesheet">
</head>

<body style="margin:0;background:#0d0d0d;color:#fff;font-family:Arial,Helvetica,sans-serif;">

<!-- HEADER -->
<div style="background:#111;padding:30px 10px;text-align:center;border-bottom:2px solid #333;">
    <h1 style="margin:0;font-size:32px;color:#66ccff;">PAGE_TITLE_HERE</h1>
    <p style="margin:8px 0 0;color:#ccc;font-size:16px;">
        We pay the freight… so you don’t have to.
    </p>
</div>

<!-- MAIN CONTENT AREA -->
<div style="
    max-width:900px;
    margin:40px auto;
    padding:20px;
    background:#141414;
    border-radius:12px;
    border:2px solid #66ccff;
    box-shadow:
        0 0 40px #66ccff,
        0 0 80px #66ccff,
        0 0 140px #66ccff;
">

    <!-- PAGE CONTENT GOES HERE -->
    <h2 style="color:#66ccff;text-align:center;margin-top:0;">Section Title</h2>

    <p style="font-size:16px;color:#bbb;line-height:1.6;text-align:center;">
        Replace this with your page content.
    </p>

</div>

<!-- TIMESTAMP ABOVE FOOTER -->
<div id="page-updated" style="text-align:center;color:#888;margin-top:20px;">
    last updated : June 6, 2026 — 1:08 PM MDT
</div>

<!-- ADMIN TOYS: METADATA + HEALTH + FLAGS + NOTES + VERSIONING -->
<script>
// UNIQUE PAGE ID (CHANGE THIS PER PAGE)
const PAGE_ID = "wptf-template";

// METADATA STORAGE KEY
const META_KEY = PAGE_ID + "-metadata";

// Load or create metadata object
let meta = localStorage.getItem(META_KEY);
meta = meta ? JSON.parse(meta) : {};

// Default metadata (only set if missing)
meta.pageName      = meta.pageName      || "Template Page";
meta.category      = meta.category      || "general";
meta.version       = meta.version       || "1.0.0";
meta.priority      = meta.priority      || 5;
meta.status        = meta.status        || "active";
meta.notes         = meta.notes         || "No notes yet.";
meta.theme         = meta.theme         || "dark";
meta.type          = meta.type          || "info";
meta.owner         = meta.owner         || "Jamie";
meta.hidden        = meta.hidden        || false;
meta.seo           = meta.seo           || false;
meta.mobileFix     = meta.mobileFix     || false;
meta.redesign      = meta.redesign      || false;
meta.health        = meta.health        || 1; // 1 = good
meta.lastVisited   = new Date().toLocaleString();

// Save metadata
localStorage.setItem(META_KEY, JSON.stringify(meta));

// ERROR LOGGER
window.onerror = function(msg, url, line) {
    meta.errors = msg + " @ line " + line;
    localStorage.setItem(META_KEY, JSON.stringify(meta));
};
</script>

<!-- PER-PAGE COUNTER ABOVE FOOTER -->
<div id="page-counter" style="text-align:center;color:#888;margin-top:10px;">
    views: loading...
</div>

<script>
// PAGE VIEW COUNTER
const COUNTER_KEY = PAGE_ID + "-views";

let views = localStorage.getItem(COUNTER_KEY);
if (!views) views = 0;
views++;
localStorage.setItem(COUNTER_KEY, views);

document.getElementById("page-counter").textContent = "views: " + views;
</script>

<!-- FOOTER (BOTTOM OF PAGE ALWAYS) -->
<footer id="footer"></footer>

<script>
fetch('footer.html')
  .then(r => r.text())
  .then(html => {
      document.getElementById('footer').innerHTML = html;
  });
</script>

</body>
</html>
