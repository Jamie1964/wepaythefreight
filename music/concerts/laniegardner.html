<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lanie Gardner Concert</title>

<!-- Header Loader -->
<div id="header"></div>
<script>
fetch('/header.html')
  .then(r => r.text())
  .then(t => { document.getElementById('header').innerHTML = t; });
</script>

<!-- Sidebar Loader -->
<div id="sidebar"></div>
<script>
fetch('/sidebar.html')
  .then(r => r.text())
  .then(t => { document.getElementById('sidebar').innerHTML = t; });
</script>

<style>
body {
  background-color: #111;
  color: #eee;
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 0;
}

h1 {
  text-align: center;
  margin-top: 40px;
  color: #fff;
}

.concert-container {
  max-width: 900px;
  margin: 40px auto;
  padding: 20px;
}

.video-box {
  background: #222;
  padding: 20px;
  margin-bottom: 30px;
}

.video-title {
  font-size: 22px;
  margin-bottom: 10px;
  color: #fff;
}

.video-embed {
  width: 100%;
  height: 400px;
  background: #000;
}

.counter-box {
  text-align: center;
  margin: 40px 0;
  color: #ccc;
  font-size: 18px;
}
</style>

</head>
<body>

<h1>Lanie Gardner Concert</h1>

<div class="concert-container">

  <div class="video-box">
    <div class="video-title">Concert Video</div>
    <iframe class="video-embed" src="" allowfullscreen></iframe>
  </div>

  <div class="video-box">
    <div class="video-title">Bonus Performance</div>
    <iframe class="video-embed" src="" allowfullscreen></iframe>
  </div>

</div>

<!-- Page View Counter -->
<div class="counter-box">
  Views: <span id="pageCounter">0</span>
</div>

<script>
let pageId = "lanie-gardner";
let count = localStorage.getItem(pageId) || 0;
count++;
localStorage.setItem(pageId, count);
document.getElementById("pageCounter").innerText = count;
</script>

<!-- Last Updated -->
<div style="text-align:center; margin-bottom:40px; color:#777;">
  Last Updated: July 8, 2026
</div>

<!-- FILE END: lanie-gardner.html -->
</body>
</html>
