<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Stand-Up Comedy Directory</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Stand-up comedy directory featuring comedians, videos, and profiles.">

<link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:ital,wght@1,300&display=swap" rel="stylesheet">
</head>

<body style="margin:0;background:#e8f3ff;color:#fff;font-family:Arial,Helvetica,sans-serif;">


<!-- SIDEBAR -->
<div id="sidebar" style="
    width:260px;
    background:#111;
    color:#fff;
    position:fixed;
    top:0;
    left:0;
    bottom:0;
    overflow-y:auto;
    padding:120px 15px 15px 15px;
    box-shadow:0 0 20px #000;
    z-index:9999;
"></div>

<script>
fetch("/laughs/standup/sidebar.html")
  .then(r => r.text())
  .then(html => document.getElementById("sidebar").innerHTML = html);
</script>


<!-- PAGE CONTENT -->
<div style="margin-left:260px;">


<!-- TOP BANNER -->
<div style="background:#e8f3ff;text-align:center;padding:0;">
    <a href="https://wepaythefreight.com/index.html">
        <img src="https://wepaythefreight.com/images/WPTF-logo.png"
             alt="WePayTheFreight.com Logo"
             style="width:100%;max-width:100%;height:160px;object-fit:contain;display:block;margin:0 auto;">
    </a>
</div>


<!-- TITLE -->
<div style="
    max-width:900px;
    margin:40px auto;
    padding:20px;
    background:#e8f3ff;
    border-radius:12px;
    border:2px solid #0096FF;
    box-shadow:
        0 0 40px #0096FF,
        0 0 80px #0096FF,
        0 0 140px #0096FF;
">
    <p style="font-size:55px;line-height:1.2;color:#0096FF;text-align:center;
              font-family:'Times New Roman', Times, serif;
              font-style:italic;font-weight:bold;">
        Stand-Up Comedians Directory
    </p>
</div>


<!-- AUTO-GENERATED LIST -->
<div style="
    max-width:900px;
    margin:0 auto 40px;
    color:#333;
    background:#fff;
    padding:20px;
    border-radius:10px;
    border:2px solid #0096FF;
    line-height:1.6;
">
    <h2 style="color:#0096FF;font-size:26px;margin-top:0;">Stand-Up Comedians</h2>

    <div id="comedian-list" style="margin-left:20px;font-size:18px;">
        Loading comedians...
    </div>
</div>


<script>
// Auto-load comedian filenames from the folder
fetch("/laughs/standup/comedians/")
  .then(r => r.text())
  .then(text => {
      const files = [...text.matchAll(/href="([^"]+\.html)"/g)]
                     .map(m => m[1])
                     .filter(name => 
                         name !== "index.html" &&
                         !name.includes("Copy") &&
                         !name.includes("aa- DIRECTORY")
                     );

      if (files.length === 0) {
          document.getElementById("comedian-list").innerHTML =
              "No comedian files found.";
          return;
      }

      files.sort();

      let html = "<ul>";
      for (const file of files) {
          const shortName = file.replace(".html", "");
          html += `
              <li>
                  <a href="/laughs/standup/comedians/${file}" 
                     style="color:#0096FF;text-decoration:none;">
                      ${shortName}
                  </a>
              </li>
          `;
      }
      html += "</ul>";

      document.getElementById("comedian-list").innerHTML = html;
  });
</script>


<!-- FOOTER LOADER -->
<footer id="footer"></footer>

<script>
fetch("https://wepaythefreight.com/footer.html")
  .then(r => r.text())
  .then(html => {
      document.getElementById('footer').innerHTML = html;
  });
</script>


</div> <!-- END PAGE CONTENT -->

</body>
</html>
