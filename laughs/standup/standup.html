<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Stand-Up Comedy Directory</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Stand-up comedy directory featuring comedians, videos, and profiles.">

<link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:ital,wght@1,300&display=swap" rel="stylesheet">
</head>

<body style="margin:0;background:#e8f3ff;color:#fff;font-family:Arial,Helvetica,sans-serif;">


<!-- SIDEBAR -->
<div id="sidebar" style="
    width:260px;
    background:#111;
    color:#fff;
    position:fixed;
    top:0;
    left:0;
    bottom:0;
    overflow-y:auto;
    padding:120px 15px 15px 15px;
    box-shadow:0 0 20px #000;
    z-index:9999;
"></div>


<!-- PAGE CONTENT -->
<div style="margin-left:260px;">


<!-- TOP BANNER (FIXED WITH HARD LINK) -->
<div style="background:#e8f3ff;text-align:center;padding:0;">
    <a href="https://wepaythefreight.com/index.html">
        <img src="https://wepaythefreight.com/images/WPTF-logo.png"
             alt="WePayTheFreight.com Logo"
             style="width:100%;max-width:100%;height:160px;object-fit:contain;display:block;margin:0 auto;">
    </a>
</div>


<!-- TITLE -->
<div style="
    max-width:900px;
    margin:40px auto;
    padding:20px;
    background:#e8f3ff;
    border-radius:12px;
    border:2px solid #0096FF;
    box-shadow:
        0 0 40px #0096FF,
        0 0 80px #0096FF,
        0 0 140px #0096FF;
">
    <p style="font-size:55px;line-height:1.2;color:#0096FF;text-align:center;
              font-family:'Times New Roman', Times, serif;
              font-style:italic;font-weight:bold;">
        Stand-Up Comedians Directory
    </p>
</div>


<!-- MAIN CONTENT TREE VIEW -->
<div id="tree" style="
    max-width:900px;
    margin:0 auto 40px;
    color:#333;
    background:#fff;
    padding:20px;
    border-radius:10px;
    border:2px solid #0096FF;
    line-height:1.6;
">
    <h2 style="color:#0096FF;font-size:26px;margin-top:0;">Stand-Up Comedians</h2>

    <div id="tree-content" style="margin-top:20px;"></div>
</div>


<!-- FOOTER LOADER -->
<footer id="footer"></footer>

<script>
fetch("https://wepaythefreight.com/footer.html")
  .then(r => r.text())
  .then(html => {
      document.getElementById('footer').innerHTML = html;
  });
</script>


</div> <!-- END PAGE CONTENT -->


<!-- SIDEBAR LOADER (IMPROVED WITH CLEAN LABELS) -->
<script>
async function buildSidebar() {
    const sidebar = document.getElementById("sidebar");

    let data;
    try {
        const res = await fetch("https://wepaythefreight.com/api/pages");
        data = await res.json();
    } catch (e) {
        sidebar.innerHTML = "<p style='color:#f66;'>Sidebar failed to load.</p>";
        return;
    }

    const pages = data.pages || [];

    const HIDDEN_FOLDERS = ["amin","images"];
    const HIDDEN_FILES = [
        "FULL WPTF TEMPLATE WITH ALL ADMIN TOYS.html",
        "tools - Copy.html",
        "footer.html",
        "index2.html",
        "copilotbackupentrances.html"
    ];

    const allowed = pages.filter(path => {
        const parts = path.split("/");
        const isFile = path.includes("/");

        if (HIDDEN_FOLDERS.some(f => path === f || path.startsWith(f + "/"))) return false;
        if (HIDDEN_FILES.includes(path)) return false;
        if (isFile && path.endsWith("index.html") && path !== "index.html") return false;

        return true;
    });

    const groups = {};
    allowed.forEach(path => {
        const parts = path.split("/");
        if (parts.length === 1) {
            if (!groups["_root"]) groups["_root"] = [];
            groups["_root"].push(parts[0]);
        } else {
            const folder = parts[0];
            const file = parts.slice(1).join("/");
            if (!groups[folder]) groups[folder] = [];
            groups[folder].push(file);
        }
    });

    sidebar.innerHTML = `
        <h2 style="color:#b366ff;font-family:'Roboto Condensed',sans-serif;font-style:italic;margin-top:0;">
            WPTF Menu
        </h2>
    `;

    function cleanLabel(str) {
        return str
            .replace('.html','')
            .replace(/_/g,' ')
            .replace(/\b\w/g, c => c.toUpperCase());
    }

    if (groups["_root"]) {
        groups["_root"].forEach(page => {
            sidebar.innerHTML += `
                <a href="https://wepaythefreight.com/${page}" 
                   style="color:#0096FF;text-decoration:none;display:block;margin:10px 0;">
                    ${cleanLabel(page)}
                </a>
            `;
        });
    }

    Object.keys(groups).forEach(folder => {
        if (folder === "_root") return;

        const files = groups[folder];

        sidebar.innerHTML += `
            <div style="margin-top:20px;font-weight:bold;color:#b366ff;cursor:pointer;"
                 onclick="this.nextElementSibling.style.display =
                 (this.nextElementSibling.style.display === 'none' ? 'block' : 'none');">
                ${cleanLabel(folder)} ▼
            </div>
            <div style="margin-left:10px;margin-top:5px;display:block;">
                ${files.map(f => `
                    <a href="https://wepaythefreight.com/${folder}/${f}" 
                       style="color:#fff;text-decoration:none;display:block;margin:6px 0;">
                        ${cleanLabel(f)}
                    </a>
                `).join("")}
            </div>
        `;
    });
}

buildSidebar();
</script>


<!-- MAIN CONTENT TREE VIEW LOADER (ONLY standup/ FOLDER) -->
<script>
async function buildTree() {
    const container = document.getElementById("tree-content");

    let data;
    try {
        const res = await fetch("https://wepaythefreight.com/api/pages");
        data = await res.json();
    } catch (e) {
        container.innerHTML = "<p style='color:red;'>Failed to load directory tree.</p>";
        return;
    }

    const pages = data.pages || [];

    const standupFiles = pages.filter(path => path.startsWith("standup/"));

    if (standupFiles.length === 0) {
        container.innerHTML = "<p>No files found in the standup folder.</p>";
        return;
    }

    let html = `
        <h3 style="color:#0096FF;">standup/</h3>
        <ul style="margin-left:20px;display:block;">
    `;

    standupFiles.forEach(file => {
        const filename = file.replace("standup/", "");
        html += `
            <li>
                <a href="https://wepaythefreight.com/${file}">
                    ${filename}
                </a>
            </li>
        `;
    });

    html += "</ul>";

    container.innerHTML = html;
}

buildTree();
</script>


</body>
</html>
