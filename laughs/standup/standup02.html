<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Stand-Up Comedy Directory</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Stand-up comedy directory featuring comedians, videos, and profiles.">

<link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:ital,wght@1,300&display=swap" rel="stylesheet">
</head>

<body style="margin:0;background:#e8f3ff;color:#fff;font-family:Arial,Helvetica,sans-serif;">


<!-- SIDEBAR -->
<div id="sidebar" style="
    width:260px;
    background:#111;
    color:#fff;
    position:fixed;
    top:0;
    left:0;
    bottom:0;
    overflow-y:auto;
    padding:120px 15px 15px 15px;
    box-shadow:0 0 20px #000;
    z-index:9999;
"></div>


<!-- PAGE CONTENT -->
<div style="margin-left:260px;">


<!-- TOP BANNER -->
<div style="background:#e8f3ff;text-align:center;padding:0;">
    <a href="https://wepaythefreight.com/index.html">
        <img src="https://wepaythefreight.com/images/WPTF-logo.png"
             alt="WePayTheFreight.com Logo"
             style="width:100%;max-width:100%;height:160px;object-fit:contain;display:block;margin:0 auto;">
    </a>
</div>


<!-- TITLE -->
<div style="
    max-width:900px;
    margin:40px auto;
    padding:20px;
    background:#e8f3ff;
    border-radius:12px;
    border:2px solid #0096FF;
    box-shadow:
        0 0 40px #0096FF,
        0 0 80px #0096FF,
        0 0 140px #0096FF;
">
    <p style="font-size:55px;line-height:1.2;color:#0096FF;text-align:center;
              font-family:'Times New Roman', Times, serif;
              font-style:italic;font-weight:bold;">
        Stand-Up Comedians Directory
    </p>
</div>


<!-- MAIN CONTENT TREE VIEW -->
<div id="tree" style="
    max-width:900px;
    margin:0 auto 40px;
    color:#333;
    background:#fff;
    padding:20px;
    border-radius:10px;
    border:2px solid #0096FF;
    line-height:1.6;
">
    <h2 style="color:#0096FF;font-size:26px;margin-top:0;">Stand-Up Comedians</h2>

    <div id="tree-content" style="margin-top:20px;"></div>
</div>


<!-- FOOTER LOADER -->
<footer id="footer"></footer>

<script>
fetch("https://wepaythefreight.com/footer.html")
  .then(r => r.text())
  .then(html => {
      document.getElementById('footer').innerHTML = html;
  });
</script>


</div> <!-- END PAGE CONTENT -->


<!-- ⭐ SIDEBAR LOADER — CLEAN LABELS, NO FOLDERS -->
<script>
async function buildSidebar() {
    const sidebar = document.getElementById("sidebar");

    let data;
    try {
        const res = await fetch("https://wepaythefreight.com/api/pages");
        data = await res.json();
    } catch (e) {
        sidebar.innerHTML = "<p style='color:#f66;'>Sidebar failed to load.</p>";
        return;
    }

    const pages = data.pages || [];

    // ⭐ Only show comedian HTML files
    const comedianFiles = pages.filter(path =>
        path.startsWith("laughs/standup/comedians/") &&
        path.endsWith(".html")
    );

    // ⭐ Clean label function
    function cleanLabel(str) {
        return str
            .replace('.html','')
            .replace(/_/g,' ')
            .replace(/\b\w/g, c => c.toUpperCase());
    }

    // ⭐ Sidebar title
    sidebar.innerHTML = `
        <h2 style="color:#b366ff;font-family:'Roboto Condensed',sans-serif;font-style:italic;margin-top:0;">
            Stand-Up Comedians
        </h2>
    `;

    // ⭐ Add each comedian
    comedianFiles.forEach(fullPath => {
        const filename = fullPath.replace("laughs/standup/comedians/", "");

        sidebar.innerHTML += `
            <a href="/${fullPath}"
               style="color:#fff;text-decoration:none;display:block;margin:6px 0;">
                ${cleanLabel(filename)}
            </a>
        `;
    });
}
buildSidebar();
</script>


<!-- ⭐ TREE VIEW — FIXED TO READ comedians/ FOLDER -->
<script>
async function buildTree() {
    const container = document.getElementById("tree-content");

    let data;
    try {
        const res = await fetch("https://wepaythefreight.com/api/pages");
        data = await res.json();
    } catch (e) {
        container.innerHTML = "<p style='color:red;'>Failed to load directory tree.</p>";
        return;
    }

    const pages = data.pages || [];

    // ⭐ Now show files inside the comedians folder
    const standupFiles = pages.filter(path =>
        path.startsWith("laughs/standup/comedians/") &&
        path.endsWith(".html")
    );

    if (standupFiles.length === 0) {
        container.innerHTML = "<p>No files found in the comedians folder.</p>";
        return;
    }

    let html = `
        <h3 style="color:#0096FF;">laughs/standup/comedians/</h3>
        <ul style="margin-left:20px;display:block;">
    `;

    standupFiles.forEach(file => {
        const filename = file.replace("laughs/standup/comedians/", "");
        html += `
            <li>
                <a href="/${file}">
                    ${filename}
                </a>
            </li>
        `;
    });

    html += "</ul>";

    container.innerHTML = html;
}

buildTree();
</script>


</body>
</html>
