    <!-- AUTO‑GENERATED COMEDIAN LIST -->
    <div id="comedian-list" style="margin-left:10px;font-size:16px;line-height:1.5;"></div>
</div>

<script>
// Auto-load comedian filenames from the comedians folder
fetch("comedians/")
  .then(r => r.text())
  .then(text => {
      const files = [...text.matchAll(/href="([^"]+\.html)"/g)]
                     .map(m => m[1])
                     .filter(name => name !== "index.html");

      files.sort();

      let html = "";

      for (const file of files) {
          const shortName = file.replace(".html", "");
          html += `
            <div>
                <a href="comedians/${file}" style="color:#fff;text-decoration:none;">
                    ${shortName}
                </a>
            </div>
          `;
      }

      document.getElementById("comedian-list").innerHTML = html;
  });
</script>
